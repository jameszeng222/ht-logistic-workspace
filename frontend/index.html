<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HT Logistic Workspace</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>HT Logistic Workspace</h1>
    <div class="status" id="pi-status">AI: 连接中…</div>
  </header>

  <main class="workspace">
    <!-- 左：工具区 -->
    <aside class="tools-panel">
      <h2>工具</h2>
      <ul class="tool-list" id="tool-list">
        <!-- 由 app.js 动态渲染 -->
      </ul>
    </aside>

    <!-- 中：工作区（输入→处理→结果） -->
    <section class="work-panel">
      <!-- 当前工具标题 -->
      <div class="work-header">
        <h2 id="current-tool">请选择左侧工具</h2>
      </div>

      <!-- 输入区：拖拽 + 表单 -->
      <div class="work-input" id="work-input">
        <div class="dropzone" id="dropzone">
          <p>拖入 Excel / PDF 文件</p>
          <p class="hint">或点击选择</p>
          <input type="file" id="file-input" hidden />
        </div>
      </div>

      <!-- 处理中 -->
      <div class="work-processing" id="work-processing" hidden>
        <p>处理中…</p>
      </div>

      <!-- 结果区：预览 + 下载 -->
      <div class="work-result" id="work-result" hidden>
        <div class="result-actions">
          <a id="download-link" class="btn primary" download>下载结果</a>
          <button class="btn" id="ask-ai-btn">让 AI 检查</button>
        </div>
      </div>
    </section>

    <!-- 右：AI 助手区 -->
    <aside class="ai-panel">
      <h2>AI 助手</h2>
      <div class="ai-messages" id="ai-messages">
        <div class="ai-msg system">可问我：解释报告、检查缺失字段、写邮件说明、查业务知识</div>
      </div>
      <div class="ai-input">
        <input type="text" id="ai-input" placeholder="问 AI…" />
        <button id="ai-send">发送</button>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
